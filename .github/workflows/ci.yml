name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Verify CLI
        run: node bin/forge.js --version

      - name: Create Release Archive
        shell: bash
        run: |
          mkdir -p forge-${{ github.ref_name }}-${{ matrix.os }}-node${{ matrix.node-version }}
          cp -r bin dist package.json README.md LICENSE forge-${{ github.ref_name }}-${{ matrix.os }}-node${{ matrix.node-version }}/
          zip -r forge-${{ github.ref_name }}-${{ matrix.os }}-node${{ matrix.node-version }}.zip forge-${{ github.ref_name }}-${{ matrix.os }}-node${{ matrix.node-version }}/

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: forge-${{ github.ref_name }}-${{ matrix.os }}-node${{ matrix.node-version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
